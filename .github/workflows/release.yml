name: Release

# Version-only workflow. Runs semantic-release to analyse conventional
# commits on master, update CHANGELOG.md + package.json / composer.json /
# Version.php, commit the bump back to master, and push a `v…` tag.
# Actual publishing (npm + GitHub Release + Packagist) happens in
# `publish.yml`, which is triggered by the tag push.

on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run semantic-release in dry-run mode (no tag, no commit)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi
